name: Grok Auto Register - Full Otomatis

on:
  workflow_dispatch:
    inputs:
      register_count:
        description: 'Jumlah akun mau register'
        required: true
        default: '5'
      email_provider:
        description: 'Email provider (duckmail/mailtm/cloudflare)'
        required: true
        default: 'duckmail'
        type: choice
        options:
          - duckmail
          - mailtm
          - cloudflare

jobs:
  grok-register:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
    - name: Download Grok Register Source
      run: |
        Write-Host "=== STEP 1: DOWNLOAD SOURCE ==="
        git clone https://github.com/dailysweetfa/grokauto-cli-register-9router.git C:\grok-register
        if (Test-Path "C:\grok-register\grok_core.pyd") { Write-Host "grok_core.pyd found" }
      shell: pwsh

    - name: Install Python 3.14
      run: |
        Write-Host "=== STEP 2: INSTALL PYTHON 3.14 ==="
        Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.14.3/python-3.14.3-amd64.exe" -OutFile "$env:TEMP\python-installer.exe"
        Start-Process "$env:TEMP\python-installer.exe" -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1 Include_test=0 TargetDir=C:\Python314" -Wait -NoNewWindow
        & C:\Python314\python.exe --version
      shell: pwsh

    - name: Install Dependencies
      run: |
        Write-Host "=== STEP 3: INSTALL DEPENDENCIES ==="
        & C:\Python314\python.exe -m pip install --upgrade pip 2>&1
        & C:\Python314\python.exe -m pip install -r C:\grok-register\requirements.txt 2>&1
        Write-Host "Dependencies installed"
      shell: pwsh

    - name: Install Google Chrome
      run: |
        Write-Host "=== STEP 4: INSTALL CHROME ==="
        $url = "https://dl.google.com/chrome/install/latest/chrome_installer.exe"
        Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\chrome_installer.exe"
        Start-Process "$env:TEMP\chrome_installer.exe" -ArgumentList "/silent /install" -Wait
        Write-Host "Chrome installed"
      shell: pwsh

    - name: Setup Config
      run: |
        Write-Host "=== STEP 5: SETUP CONFIG ==="
        $configPath = "C:\grok-register\config.json"
        Copy-Item "C:\grok-register\config.example.json" $configPath -Force
        $config = Get-Content $configPath -Raw | ConvertFrom-Json
        $config.email_provider = "${{ github.event.inputs.email_provider }}"
        $config.register_count = [int]"${{ github.event.inputs.register_count }}"
        $config.concurrent_count = 1
        $config.cpa_export_enabled = $true
        $config.cpa_headless = $true
        $config.browser_restart_every = 5
        $config | ConvertTo-Json -Depth 20 | Set-Content $configPath -Encoding UTF8
        Get-Content $configPath
      shell: pwsh

    - name: Run Grok Register
      run: |
        Write-Host "=== STEP 6: RUN GROK REGISTER ==="
        Write-Host "Start: $(Get-Date)"
        Set-Location C:\grok-register
        & C:\Python314\python.exe grok_register_ttk.py cli
        Write-Host "=== COMPLETE ==="
        Write-Host "End: $(Get-Date)"
      shell: pwsh

    - name: Collect Results
      run: |
        Write-Host "=== COLLECTING RESULTS ==="
        Set-Location C:\grok-register
        Get-ChildItem -Recurse -File | Where-Object { $_.Name -match "accounts_|tokens\.txt|cpa_auths|\.log$" } | ForEach-Object { Write-Host "  $($_.FullName) ($($_.Length) bytes)" }
      shell: pwsh

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: grok-results-${{ github.run_number }}
        path: |
          C:\grok-register\accounts_*.txt
          C:\grok-register\tokens.txt
          C:\grok-register\cpa_auths\
          C:\grok-register\*.log
        retention-days: 7
        if-no-files-found: warn