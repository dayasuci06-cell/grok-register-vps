name: Grok Auto Register - Full Otomatis

on:
  workflow_dispatch:
    inputs:
      register_count:
        description: 'Jumlah akun mau register'
        required: true
        default: '5'
      email_provider:
        description: 'Email provider (duckmail/mailtm/cloudflare)'
        required: true
        default: 'duckmail'
        type: choice
        options:
          - duckmail
          - mailtm
          - cloudflare

jobs:
  grok-register:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
    - name: Download Grok Register Source
      run: |
        Write-Host "=== STEP 1: DOWNLOAD SOURCE ==="
        git clone https://github.com/dailysweetfa/grokauto-cli-register-9router.git C:/grok-register
        if (Test-Path "C:/grok-register/grok_core.pyd") { Write-Host "grok_core.pyd found" }
      shell: pwsh

    - name: Install VC++ Redistributable
      run: |
        Write-Host "=== INSTALL VC++ REDISTRIBUTABLE ==="
        $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
        Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\vc_redist.exe"
        Start-Process "$env:TEMP\vc_redist.exe" -ArgumentList "/install /quiet /norestart" -Wait
        Write-Host "VC++ Redistributable installed"
        Write-Host "Checking VC++ DLLs..."
        $dlls = @("vcruntime140.dll", "msvcp140.dll", "vcruntime140_1.dll")
        foreach ($dll in $dlls) {
            $found = Get-ChildItem "C:\Windows\System32\$dll" -ErrorAction SilentlyContinue
            if ($found) { Write-Host "  FOUND: $dll" } else { Write-Host "  MISSING: $dll" }
        }
      shell: pwsh

    - name: Setup Python 3.14.3 (Exact Version)
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.3'

    - name: Verify Python and VC++ Runtime
      run: |
        python --version
        python -c "import ctypes, os; print('ctypes OK')"
        python -c "import sys; print(f'python314.dll: {sys.prefix}'); print(f'Path: {sys.path}')"
      shell: bash

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r C:/grok-register/requirements.txt
        python -m pip install psutil pefile
        echo "Dependencies installed"
      shell: bash

    - name: Install Google Chrome
      run: |
        Write-Host "=== INSTALL CHROME ==="
        $url = "https://dl.google.com/chrome/install/latest/chrome_installer.exe"
        Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\chrome_installer.exe"
        Start-Process "$env:TEMP\chrome_installer.exe" -ArgumentList "/silent /install" -Wait
        Write-Host "Chrome installed"
      shell: pwsh

    - name: Setup Config
      run: |
        Write-Host "=== SETUP CONFIG ==="
        $configPath = "C:/grok-register/config.json"
        Copy-Item "C:/grok-register/config.example.json" $configPath -Force
        $config = Get-Content $configPath -Raw | ConvertFrom-Json
        $config.email_provider = "${{ github.event.inputs.email_provider }}"
        $config.register_count = [int]"${{ github.event.inputs.register_count }}"
        $config.concurrent_count = 1
        $config.cpa_export_enabled = $true
        $config.cpa_headless = $true
        $config.browser_restart_every = 5
        $config | ConvertTo-Json -Depth 20 | Set-Content $configPath -Encoding UTF8
        Get-Content $configPath
      shell: pwsh

    - name: Test Import grok_core
      continue-on-error: true
      run: |
        python -c "
        import sys, ctypes, os
        print(f'Python: {sys.version}')
        print(f'Executable: {sys.executable}')
        # Check VC++ runtime
        try:
            ctypes.CDLL('vcruntime140.dll')
            print('vcruntime140.dll: OK')
        except:
            print('vcruntime140.dll: MISSING')
        # Try import
        try:
            import grok_core
            print('grok_core: IMPORT OK')
        except Exception as e:
            print(f'grok_core: ERROR {type(e).__name__}: {e}')
        "
      shell: python
      working-directory: C:/grok-register

    - name: Run Grok Register
      run: |
        Write-Host "=== RUN GROK REGISTER ==="
        Write-Host "Start: $(Get-Date)"
        $ErrorActionPreference = "Continue"
        python grok_register_ttk.py cli 2>&1
        Write-Host "Exit code: $LASTEXITCODE"
        Write-Host "=== COMPLETE ==="
        Write-Host "End: $(Get-Date)"
      shell: pwsh
      working-directory: C:/grok-register

    - name: Collect Results
      run: |
        Write-Host "=== COLLECTING RESULTS ==="
        Get-ChildItem -Recurse -File | Where-Object { $_.Name -match "accounts_|tokens\.txt|cpa_auths|\.log$" } | ForEach-Object { Write-Host "  $($_.FullName) ($($_.Length) bytes)" }
        if (Test-Path "cpa_auths") {
          Get-ChildItem cpa_auths -File | ForEach-Object { Write-Host "  CPA: $($_.Name)" }
        }
      shell: pwsh
      working-directory: C:/grok-register

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: grok-results-${{ github.run_number }}
        path: |
          C:/grok-register/accounts_*.txt
          C:/grok-register/tokens.txt
          C:/grok-register/cpa_auths/
          C:/grok-register/*.log
        retention-days: 7
        if-no-files-found: warn